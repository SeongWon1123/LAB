name: pocket_memory_pet
description: A local-first retro pixel pet app for iOS and Android.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.3.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  flutter_local_notifications: ^22.0.0
  timezone: ^0.11.0
  flame: ^1.23.0
  flame_audio: ^2.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  golden_toolkit: ^0.15.0

flutter:
  uses-material-design: true
  fonts:
    - family: VT323
      fonts:
        - asset: assets/fonts/VT323-Regular.ttf
  assets:
    - assets/sprites/pets/
    - assets/sprites/icons/
    - assets/sprites/effects/
    - assets/sounds/
    - assets/images/brand/
    - assets/images/backgrounds/
    - assets/images/shells/
    - assets/images/rooms/
