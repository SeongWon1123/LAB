name: Native Build

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate native project
        run: bash tool/prepare_native_project.sh

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-debug-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload release AAB
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-release-aab-${{ github.run_number }}
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14

      - name: Initialize Android emulator smoke log
        run: |
          mkdir -p build/qa
          {
            echo "workflow=Native Build"
            echo "job=android"
            echo "run_number=${{ github.run_number }}"
            echo "run_id=${{ github.run_id }}"
            echo "commit=${{ github.sha }}"
            echo "branch=${{ github.ref_name }}"
            echo "generated_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "emulator_api_level=30"
            echo "emulator_profile=pixel_2"
            echo "package_id=com.wellnessmaker.pocketmemorypet"
            echo "launch_result=not_run"
            echo "failure_reason=emulator_step_not_completed"
          } > build/qa/android-emulator-smoke.txt

      - name: Smoke launch Android debug APK
        timeout-minutes: 25
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: pixel_2
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -no-snapshot-save -no-snapshot-load
          disable-animations: true
          script: |
            set -euo pipefail
            package_id="com.wellnessmaker.pocketmemorypet"
            apk="build/app/outputs/flutter-apk/app-debug.apk"
            smoke_log="build/qa/android-emulator-smoke.txt"
            screenshot="/sdcard/pocket-memory-pet-smoke.png"
            pulled_screenshot="build/qa/android-emulator-smoke.png"
            mkdir -p build/qa

            launch_result="failed"
            launch_output=""
            pid=""
            installed_path=""

            cleanup() {
              code=$?
              {
                echo "workflow=Native Build"
                echo "job=android"
                echo "run_number=${{ github.run_number }}"
                echo "run_id=${{ github.run_id }}"
                echo "commit=${{ github.sha }}"
                echo "branch=${{ github.ref_name }}"
                echo "generated_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                echo "emulator_api_level=30"
                echo "emulator_profile=pixel_2"
                echo "package_id=$package_id"
                echo "apk_path=$apk"
                echo "installed_path=$installed_path"
                echo "launch_result=$launch_result"
                echo "process_id=$pid"
                echo "launch_output=$(printf '%s' "$launch_output" | tr '\n' ' ')"
                if [ -f "$pulled_screenshot" ]; then
                  echo "screenshot=android-emulator-smoke.png"
                  echo "screenshot_size_bytes=$(stat -c%s "$pulled_screenshot")"
                  echo "screenshot_sha256=$(sha256sum "$pulled_screenshot" | awk '{print $1}')"
                fi
              } > "$smoke_log"
              echo "ANDROID_EMULATOR_LAUNCH_RESULT=$launch_result" >> "$GITHUB_ENV"
              echo "ANDROID_EMULATOR_PACKAGE=$package_id" >> "$GITHUB_ENV"
              exit "$code"
            }
            trap cleanup EXIT

            if [ ! -f "$apk" ]; then
              echo "Android debug APK does not exist: $apk"
              exit 1
            fi

            adb devices
            adb install -r "$apk"
            installed_path="$(adb shell pm path "$package_id" | tr -d '\r' || true)"
            if [ -z "$installed_path" ]; then
              echo "Package was not installed: $package_id"
              exit 1
            fi

            launch_output="$(adb shell monkey -p "$package_id" -c android.intent.category.LAUNCHER 1 2>&1 | tr -d '\r')"
            sleep 8
            pid="$(adb shell pidof "$package_id" | tr -d '\r' || true)"
            if [ -z "$pid" ]; then
              adb logcat -d -t 250 > build/qa/android-emulator-logcat.txt || true
              echo "Android app process was not running after launch."
              exit 1
            fi

            adb shell screencap -p "$screenshot" || true
            adb pull "$screenshot" "$pulled_screenshot" || true
            launch_result="passed"

      - name: Upload Android emulator smoke log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-emulator-smoke-${{ github.run_number }}
          path: |
            build/qa/android-emulator-smoke.txt
            build/qa/android-emulator-smoke.png
            build/qa/android-emulator-logcat.txt
          if-no-files-found: error
          retention-days: 14

      - name: Write Android QA manifest
        if: always()
        run: |
          mkdir -p build/qa
          debug_apk="build/app/outputs/flutter-apk/app-debug.apk"
          release_aab="build/app/outputs/bundle/release/app-release.aab"
          {
            echo "workflow=Native Build"
            echo "job=android"
            echo "run_number=${{ github.run_number }}"
            echo "run_id=${{ github.run_id }}"
            echo "commit=${{ github.sha }}"
            echo "branch=${{ github.ref_name }}"
            echo "generated_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "debug_apk_artifact=android-debug-apk-${{ github.run_number }}"
            echo "debug_apk_path=$debug_apk"
            echo "debug_apk_size_bytes=$(stat -c%s "$debug_apk")"
            echo "debug_apk_sha256=$(sha256sum "$debug_apk" | awk '{print $1}')"
            echo "release_aab_artifact=android-release-aab-${{ github.run_number }}"
            echo "release_aab_path=$release_aab"
            echo "release_aab_size_bytes=$(stat -c%s "$release_aab")"
            echo "release_aab_sha256=$(sha256sum "$release_aab" | awk '{print $1}')"
            echo "android_emulator_smoke_artifact=android-emulator-smoke-${{ github.run_number }}"
            echo "android_emulator_launch_result=${ANDROID_EMULATOR_LAUNCH_RESULT:-not_run}"
            echo "android_emulator_package=${ANDROID_EMULATOR_PACKAGE:-com.wellnessmaker.pocketmemorypet}"
            echo "build_commands=flutter build apk --debug; flutter build appbundle --release"
            echo
            flutter --version
          } > build/qa/android-manifest.txt

      - name: Upload Android QA manifest
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-qa-manifest-${{ github.run_number }}
          path: build/qa/android-manifest.txt
          if-no-files-found: error
          retention-days: 14

  ios-simulator:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate native project
        run: bash tool/prepare_native_project.sh

      - name: Build iOS simulator
        run: flutter build ios --simulator --no-codesign

      - name: Package iOS simulator app
        run: |
          app_path="$(find build/ios/iphonesimulator -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "No iOS simulator .app bundle found."
            find build/ios -maxdepth 3 -type d -name '*.app' -print
            exit 1
          fi
          echo "Packaging iOS simulator app: $app_path"
          app_dir="$(dirname "$app_path")"
          app_name="$(basename "$app_path")"
          if [ "$app_name" != "Pocket Memory Pet.app" ]; then
            echo "Unexpected iOS simulator app bundle: $app_name"
            exit 1
          fi
          echo "IOS_SIMULATOR_APP_BUNDLE=$app_name" >> "$GITHUB_ENV"
          echo "IOS_SIMULATOR_APP_PATH=$app_path" >> "$GITHUB_ENV"
          (cd "$app_dir" && ditto -c -k --keepParent "$app_name" Pocket-Memory-Pet-simulator.app.zip)
          unzip -l build/ios/iphonesimulator/Pocket-Memory-Pet-simulator.app.zip | head -n 20

      - name: Upload iOS simulator app
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-simulator-app-${{ github.run_number }}
          path: build/ios/iphonesimulator/Pocket-Memory-Pet-simulator.app.zip
          if-no-files-found: error
          retention-days: 14

      - name: Build iOS release without signing
        run: flutter build ios --release --no-codesign

      - name: Package iOS release app
        run: |
          app_path="$(find build/ios/iphoneos -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "No iOS release .app bundle found."
            find build/ios -maxdepth 3 -type d -name '*.app' -print
            exit 1
          fi
          echo "Packaging iOS release app: $app_path"
          app_dir="$(dirname "$app_path")"
          app_name="$(basename "$app_path")"
          if [ "$app_name" != "Pocket Memory Pet.app" ]; then
            echo "Unexpected iOS release app bundle: $app_name"
            exit 1
          fi
          echo "IOS_RELEASE_APP_BUNDLE=$app_name" >> "$GITHUB_ENV"
          (cd "$app_dir" && ditto -c -k --keepParent "$app_name" Pocket-Memory-Pet-release-nocodesign.app.zip)
          unzip -l build/ios/iphoneos/Pocket-Memory-Pet-release-nocodesign.app.zip | head -n 20

      - name: Upload iOS release no-codesign app
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-release-nocodesign-app-${{ github.run_number }}
          path: build/ios/iphoneos/Pocket-Memory-Pet-release-nocodesign.app.zip
          if-no-files-found: error
          retention-days: 14

      - name: Smoke launch iOS simulator app
        timeout-minutes: 10
        run: |
          set -euo pipefail
          bundle_id="com.wellnessmaker.pocketmemorypet"
          app_path="$IOS_SIMULATOR_APP_PATH"
          smoke_log="build/qa/ios-simulator-smoke.txt"
          mkdir -p build/qa

          launch_result="failed"
          launch_output=""
          device_id=""
          device_name=""
          actual_bundle_id="unknown"

          cleanup() {
            code=$?
            {
              echo "workflow=Native Build"
              echo "job=ios"
              echo "run_number=${{ github.run_number }}"
              echo "run_id=${{ github.run_id }}"
              echo "commit=${{ github.sha }}"
              echo "branch=${{ github.ref_name }}"
              echo "generated_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo "simulator_device=$device_name"
              echo "simulator_udid=$device_id"
              echo "app_bundle=$IOS_SIMULATOR_APP_BUNDLE"
              echo "bundle_id=$bundle_id"
              echo "actual_bundle_id=$actual_bundle_id"
              echo "launch_result=$launch_result"
              echo "launch_output=$(printf '%s' "$launch_output" | tr '\n' ' ')"
            } > "$smoke_log"
            echo "IOS_SIMULATOR_LAUNCH_RESULT=$launch_result" >> "$GITHUB_ENV"
            echo "IOS_SIMULATOR_LAUNCH_DEVICE=$device_name" >> "$GITHUB_ENV"
            echo "IOS_SIMULATOR_LAUNCH_UDID=$device_id" >> "$GITHUB_ENV"
            if [ -n "$device_id" ]; then
              xcrun simctl terminate "$device_id" "$bundle_id" || true
              xcrun simctl shutdown "$device_id" || true
            fi
            exit "$code"
          }
          trap cleanup EXIT

          if [ ! -d "$app_path" ]; then
            echo "iOS simulator app path does not exist: $app_path"
            exit 1
          fi

          actual_bundle_id="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$app_path/Info.plist")"
          if [ "$actual_bundle_id" != "$bundle_id" ]; then
            echo "Unexpected bundle id: $actual_bundle_id"
            exit 1
          fi

          xcrun simctl list --json devices available > build/qa/simctl-devices.json
          device_info="$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("build/qa/simctl-devices.json").read_text(encoding="utf-8"))
          preferred: list[tuple[str, str, str]] = []
          fallback: list[tuple[str, str, str]] = []
          for runtime, devices in data.get("devices", {}).items():
              if "iOS" not in runtime:
                  continue
              for device in devices:
                  name = device.get("name", "")
                  udid = device.get("udid", "")
                  state = device.get("state", "")
                  device_type = device.get("deviceTypeIdentifier", "")
                  if not (device.get("isAvailable") and udid and ("iPhone" in device_type or name.startswith("iPhone"))):
                      continue
                  record = (udid, name, state)
                  if state == "Shutdown":
                      preferred.append(record)
                  else:
                      fallback.append(record)
          devices = preferred or fallback
          if devices:
              print("\t".join(devices[0]))
          PY
          )"
          if [ -z "$device_info" ]; then
            echo "No available iPhone simulator found."
            xcrun simctl list devices available
            exit 1
          fi
          IFS=$'\t' read -r device_id device_name device_state <<< "$device_info"
          echo "Booting simulator: $device_name ($device_id, $device_state)"
          xcrun simctl boot "$device_id" || true
          xcrun simctl bootstatus "$device_id" -b
          xcrun simctl install "$device_id" "$app_path"
          launch_output="$(xcrun simctl launch "$device_id" "$bundle_id" 2>&1)"
          sleep 5
          launch_result="passed"

      - name: Upload iOS simulator smoke log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-simulator-smoke-${{ github.run_number }}
          path: build/qa/ios-simulator-smoke.txt
          if-no-files-found: error
          retention-days: 14

      - name: Write iOS QA manifest
        if: always()
        run: |
          mkdir -p build/qa
          simulator_zip="build/ios/iphonesimulator/Pocket-Memory-Pet-simulator.app.zip"
          release_zip="build/ios/iphoneos/Pocket-Memory-Pet-release-nocodesign.app.zip"
          {
            echo "workflow=Native Build"
            echo "job=ios"
            echo "run_number=${{ github.run_number }}"
            echo "run_id=${{ github.run_id }}"
            echo "commit=${{ github.sha }}"
            echo "branch=${{ github.ref_name }}"
            echo "generated_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "simulator_app_artifact=ios-simulator-app-${{ github.run_number }}"
            echo "simulator_zip=Pocket-Memory-Pet-simulator.app.zip"
            echo "simulator_zip_size_bytes=$(stat -f%z "$simulator_zip")"
            echo "simulator_zip_sha256=$(shasum -a 256 "$simulator_zip" | awk '{print $1}')"
            echo "simulator_app_bundle=${IOS_SIMULATOR_APP_BUNDLE:-unknown}"
            echo "simulator_smoke_artifact=ios-simulator-smoke-${{ github.run_number }}"
            echo "simulator_launch_result=${IOS_SIMULATOR_LAUNCH_RESULT:-not_run}"
            echo "simulator_launch_device=${IOS_SIMULATOR_LAUNCH_DEVICE:-unknown}"
            echo "simulator_launch_udid=${IOS_SIMULATOR_LAUNCH_UDID:-unknown}"
            echo "release_nocodesign_artifact=ios-release-nocodesign-app-${{ github.run_number }}"
            echo "release_nocodesign_zip=Pocket-Memory-Pet-release-nocodesign.app.zip"
            echo "release_nocodesign_zip_size_bytes=$(stat -f%z "$release_zip")"
            echo "release_nocodesign_zip_sha256=$(shasum -a 256 "$release_zip" | awk '{print $1}')"
            echo "release_nocodesign_app_bundle=${IOS_RELEASE_APP_BUNDLE:-unknown}"
            echo "build_commands=flutter build ios --simulator --no-codesign; flutter build ios --release --no-codesign"
            echo
            flutter --version
          } > build/qa/ios-manifest.txt

      - name: Upload iOS QA manifest
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-qa-manifest-${{ github.run_number }}
          path: build/qa/ios-manifest.txt
          if-no-files-found: error
          retention-days: 14
