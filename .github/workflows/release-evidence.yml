name: Release Evidence

on:
  workflow_dispatch:

jobs:
  verify-release-artifacts:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 tool/verify_release_artifacts.py --repo "${{ github.repository }}" --branch "${{ github.ref_name }}"

      - name: Upload release evidence report
        uses: actions/upload-artifact@v7
        with:
          name: release-evidence-${{ github.run_number }}
          path: |
            build/release_artifacts/**/release_artifact_report.json
            build/release_artifacts/**/release_artifact_report.txt
          if-no-files-found: error
          retention-days: 14
