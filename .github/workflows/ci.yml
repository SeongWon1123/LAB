name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Validate release docs
        run: python3 tool/validate_release_docs.py

      - name: Validate static site
        run: python3 tool/validate_static_site.py

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Generate draft store screenshots
        run: flutter test --update-goldens tool/store_screenshot_test.dart

      - name: Validate draft store screenshots
        run: python3 tool/validate_store_screenshots.py

      - name: Generate draft store screenshot manifest
        run: python3 tool/generate_store_screenshot_manifest.py

      - name: Upload draft store screenshots
        uses: actions/upload-artifact@v7
        with:
          name: store-screenshot-drafts-${{ github.run_number }}
          path: |
            build/store_screenshots/**/*.png
            build/store_screenshots/store_screenshot_manifest.json
            build/store_screenshots/store_screenshot_manifest.txt
          if-no-files-found: error
          retention-days: 14
